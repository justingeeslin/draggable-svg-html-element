<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Custom element draggable SVG</title>
  <style>
	draggable-svg-board {
	  display: block;
	  /* width: 100%; */
	}

	draggable-svg-board svg {
	  width: 100%;
	  height: auto;
	}
  </style>
</head>
<body>
	<div style="grid-template-columns: 1fr 1fr;">
		
  <draggable-svg-board>
	<svg viewBox="0 0 1200 750" aria-label="Draggable garment parts">
	  <defs>
		<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
		  <path d="M 40 0 L 0 0 0 40"
				fill="transparent"
				pointer-events="all"
				stroke="#e6e6e6"
				stroke-width="1"/>
		</pattern>

		<symbol id="full" viewBox="0.00 0.00 1350.00 1428.00">
		  <polygon
			points="256.00,101.00 14.00,445.00 0.00,499.00 246.00,674.00 305.00,627.00 298.00,1428.00 1028.00,1421.00 1033.00,623.00 1093.00,652.00 1350.00,513.00 1120.00,119.00 932.00,29.00 824.00,0.00 759.00,34.00 646.00,45.00 535.00,0.00"
			fill="transparent"
			pointer-events="all"
			stroke="#0091EA"
			stroke-width="3"/>
		</symbol>
		
		

		<symbol id="left-sleeve" viewBox="0.00 0.00 305.00 573.00">
		  <polygon
			points="256.00,0.00 14.00,344.00 0.00,398.00 246.00,573.00 305.00,526.00"
			fill="transparent"
			stroke="#0091EA"
			stroke-width="3"/>
		</symbol>

		<symbol id="right-sleeve" viewBox="0.00 0.00 317.00 533.00">
		  <polygon
			points="0.00,504.00 60.00,533.00 317.00,394.00 87.00,0.00"
			fill="transparent"
			stroke="#0091EA"
			stroke-width="3"/>
		</symbol>
	  </defs>

	  <rect x="0" y="0" width="1200" height="750" fill="url(#grid)"></rect>

	  <g transform="translate(120 140)">
		<use href="#full" transform="scale(0.38)"></use>
		<text x="10" y="-20" font-size="20" fill="#222">full</text>
	  </g>
	  
	  <path d="M 372.25,116.116727941 L 130.25,460.116727941 L 116.25,514.116727941 L 362.25,689.116727941 L 421.25,642.116727941 Z" color="black" fill="transparent" stroke="#ff0000" stroke-width="3" id="left-sleeve2" transform="translate(-107.682,-91.656) rotate(0.000,378.759,91.656)" data-draggable="true" pointer-events="all"></path>

	  <g data-draggable="true" transform="translate(720 130)">
		<use href="#left-sleeve" transform="scale(0.8)"></use>
		<text x="0" y="0" font-size="20" fill="#222">left-sleeve</text>
	  </g>

	  <g data-draggable="true" transform="translate(780 420)">
		<use href="#right-sleeve" transform="scale(0.85)"></use>
		<text x="0" y="0" font-size="20" fill="#222">right-sleeve</text>
	  </g>
	</svg>
  </draggable-svg-board>
	</div>
  <script type="module" src="./src/DraggableSvgBoard.js" type="text/javascript"></script>
</body>
</html>
